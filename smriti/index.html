<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Meta Tags -->
    <meta name="description" content="Smriti - Your personal journal, task manager, and calendar app designed for focus and reflection" />
    <meta name="keywords" content="journal, task manager, calendar, productivity, ADHD-friendly" />
    <meta name="author" content="Smriti App" />

    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#191919" media="(prefers-color-scheme: dark)">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Open Graph -->
    <meta property="og:title" content="Smriti - Personal Journal & Productivity" />
    <meta property="og:description" content="Track your thoughts, tasks, and events with beautiful streaks and reminders" />
    <meta property="og:type" content="website" />
    
    <link rel="manifest" href="/manifest.json">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/smriti-logo.svg" />
    
    <title>Smriti - Your Personal Space</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
      
      * {
        font-family: 'Inter', sans-serif;
      }
      
      body {
        font-size: 14px;
      }
      
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      
      ::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, 0.1);
        border-radius: 3px;
      }
      
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(0, 0, 0, 0.2);
      }
      
      .dark ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
      }
      
      .dark ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.2);
      }
      
      /* Minimal card style */
      .card {
        background: rgba(0, 0, 0, 0.02);
        border: 1px solid rgba(0, 0, 0, 0.06);
        border-radius: 4px;
      }
      
      .dark .card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      
      /* Smooth transitions */
      * {
        transition: background-color 0.15s ease, color 0.15s ease, border-color 0.15s ease;
      }
      
      /* Notion-like hover */
      .hover-bg:hover {
        background-color: rgba(0, 0, 0, 0.03);
      }
      
      .dark .hover-bg:hover {
        background-color: rgba(255, 255, 255, 0.05);
      }
    </style>
  </head>
  <body class="bg-white dark:bg-[#191919]">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
