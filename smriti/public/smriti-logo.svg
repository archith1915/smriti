<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer circle -->
  <circle cx="50" cy="50" r="45" stroke="url(#grad1)" stroke-width="3" fill="none" opacity="0.3"/>
  
  <!-- Book pages -->
  <path d="M30 25 L30 75 L50 70 L50 20 Z" fill="url(#grad1)" opacity="0.6"/>
  <path d="M50 20 L50 70 L70 75 L70 25 Z" fill="url(#grad1)" opacity="0.8"/>
  
  <!-- Bookmark -->
  <path d="M42 25 L42 55 L45 52 L48 55 L48 25 Z" fill="#ffffff" opacity="0.9"/>
  
  <!-- Pen -->
  <line x1="60" y1="65" x2="72" y2="77" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="73" cy="78" r="2" fill="url(#grad1)"/>
  
  <!-- Memory wave -->
  <path d="M20 50 Q25 45, 30 50 T40 50 T50 50 T60 50 T70 50 T80 50" 
        stroke="url(#grad1)" stroke-width="1.5" fill="none" opacity="0.4"/>
</svg>